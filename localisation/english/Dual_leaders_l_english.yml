  ### (AUS) Austria ###
  AUS_Franz_Joseph_I: "Franz Joseph I."
  AUS_characters_Franz_Joseph_desc: "§YFather of Nations§!\n - £stability_texticon Stability: §G+15%§!\n - £stability_texticon Weekly Stability: §G+0.01%§!\n - £political_violence_gain_texticon Resistance Growth Speed: §G-15%§!\n\n§LHistorical Context:\n-----\nHis rise to the throne:\nAfter his uncle, Emperor Ferdinand I of Austria has abdicated the throne in 1848, Franz Joseph was crowned Emperor just at the age of 18. The country was amidst of a great revolution (1848/49 Hungarian Revolution), started by the Hungarian nobility. By the leading hands of Franz Joseph, Austria came out victorious.\n\nCementing His Powers:\nNow that the Springtime of the Peoples has ended and the age of liberalism is over, his goal is to cement his power and to supress any revolutionary ideas. Although all of his efforts Austria is once again on the brink of collapse. Over the last few years secessionist ideas have resurfaced, mainly amongst the Italians in Lombardy-Venetia. After the financial crisis of the last decade, the Hungarians have also gathered courage to make a stand against Vienna. It's the Emperor's task to show an iron fist and triumph over our enemies.\n\nRelations with the Crownlands:\n-----\nKingdom of Hungary:\nAfter his crowning in 1848, he gained all the lands of the Empire, which would mean control over all of the lands, but according to Hungarian Law, the abdication would also need to be accepted by the Hungarian Diet. This means that the Emperor is not the legitimate king of Hungary. If Franz Joseph truly wants to cement his powers, he will need to solve the Hungarian problem, which can only be done by a coronation with the Crown of St.Stephen\n\nKingdom of Bohemia:\nSimilarly to Hungary, Franz Joseph was never really crowned the King of Bohemia, despite holding the title. After the Empire's victory over Hungary, an age of Absolutism began over the nationalities, making any aspiration of restoring their historical rights impossible. But one thing is certain, that Bohemians will fight against Vienna.\n\nKingdom of Galicia and Lodomeria:\nGalicia remained loyal during the revolutions of 1848/49, but the crownland is in a crisis now. Social inequalities are widened by the ruling local elite, and waves of poverty has hit the region. Another problem is the growing pan-Slavism and Russian influence, which can hinder our authority in the kingdom." 

  ### (BAD) Baden ###
  BAD_Friedrich_I: "Friedrich I"
  BAD_characters_Friedrich_I_desc: "§YPopular Monarch§!\n - £stability_texticon Stability: §G+0.05%§!\n\n§YBorn:§! §LSeptember 9th 1826, Karlsruhe, Grand Duchy of Baden§!\n§YBackground:§! §LFriedrich I., Großherzog von Baden (Grand Duke of Baden), has exercised authority over the state since 1856, following years of political apprenticeship within the First Chamber of the Baden Estates Assembly and a prolonged regency undertaken due to the incapacity of his elder brother. Educated in statecraft and public affairs, he entered rule with direct experience of governance and a detailed familiarity with Baden’s constitutional institutions.\n\nShaped by the political traditions of Baden and the upheavals of the preceding decades, Friedrich I governs as a committed constitutional monarch, attentive to parliamentary processes and civil order. His rule reflects a preference for legal continuity, administrative stability, and gradual reform, seeking to balance dynastic authority with the expectations placed upon a German state marked by political debate and cautious liberalism. Within this framework, he stands as a ruler defined by restraint, institutional loyalty, and a measured approach to the responsibilities of sovereignty.§!"

  ### (BEL) Belgium ###
  BEL_Leopold_I: "Leopold I"
  BEL_characters_Leopold_I_desc: "§YPopular Monarch§!\n - £stability_texticon Stability: §G+0.05%§!\n\n§YBorn:§! §LDecember 16th, 1790, in Coburg, Duchy of Saxe-Coburg-Saalfeld§!\n§YBackground:§! §LRoi des Belges (King of the Belgians), Leopold I has exercised sovereign authority over the kingdom since 21 July 1831, having been called to the throne in the aftermath of Belgium’s separation from the Kingdom of the Netherlands. A German prince by birth and a veteran of the Napoleonic era, he entered Belgian service with extensive military experience and a wide network of dynastic and diplomatic connections across Europe.\n\nSince his accession, Leopold I has governed as a constitutional monarch tasked with securing the stability and international recognition of a newly established state. His reign has been marked by careful balancing between domestic political forces and the preservation of Belgium’s independence within the European order shaped after 1815. Exercising restraint in foreign affairs and attentiveness to parliamentary government at home, Leopold I stands as a stabilizing figure whose authority rests on moderation, diplomacy, and the maintenance of civil peace in a kingdom still defining its place among Europe’s powers.§!

  BEL_Leopold_II: "Leopold II"
  BEL_characters_Leopold_II_desc: "§YPopular Monarch§!\n - £stability_texticon Stability: §G+0.05%§!\n\n§YBorn:§! §LApril 9th, 1835, in Brussels, Kingdom of Belgium§!\n§YBackground:§! §LRoi des Belges (King of the Belgians), Leopold II has exercised sovereign authority over the kingdom since 17 December 1865, succeeding his father Leopold I after more than three decades of dynastic consolidation. Raised at the Belgian court and bearing the title of Duke of Brabant, he was prepared from an early age for succession through exposure to constitutional government, military service, and participation in the Senate by right of birth.\n\nHis accession marks the transition from the founding generation of the Belgian monarchy to a ruler shaped entirely within the institutions of the independent state. Leopold II inherits a stable constitutional framework and a firmly established international position, while assuming personal responsibility for the direction of royal authority within a parliamentary system. Reserved in temperament and attentive to questions of national stature and economic strength, he begins his reign as a monarch conscious of Belgium’s small size and strategic position, seeking to assert royal influence through continuity, discipline, and the careful exercise of constitutional power.§!" 

  ### (BRA) Brazil ###
  BRA_Pedro_II: "Pedro II"
  BRA_characters_Pedro_II_desc: "§YUnifying Figure§!\n - £pol_power Legislative Power Gain: §G+10.0%§!\n - £stability_texticon Stability: §G+15.0%§!\n - £stability_texticon Weekly Stability: §G+0.10%§!\n - £political_advisor_texticon Political Advisor Cost: §G-10.0%§!\n§YThe Magnanimous§!\n - £research_icon Research Speed: §G+10.0%§!\n - £research_icon Humanities Technology: §G+2.0%§!\n - £research_icon Electronics & Devices Technology: §G+2.0%§!\n - £research_icon Economics Technology: §G+2.0%§!\n\n§LBorn in the Brazilian capital of Rio de Janeiro in 1825, Dom Pedro II was the youngest son and heir of Dom Pedro I and his spouse, Dona Leopoldina. \n\nDue to his father's abdication in 1831 and eventual return to Portugal, Pedro II became emperor at the young age of 5. He was obligated to spend most of his time studying in preparation for his reign, having few happy moments and friends his age. Fighting in court and political disputes during this period had a huge effect on the formation of his character. He grew into a man with a strong sense of duty and devotion toward his country and his people, yet he became increasingly resentful of his role as monarch.\n\nWith the Declaration of Age of Pedro II, the Emperor would go on to end the chaotic regency that had been ruling the country since his father's abdication. Inheriting a disintegrating empire, he would prove to be a unifying figure in Brazilian politics and was the main responsible for the stabilization of the empire and for the end of the secessionist rebellion in Rio Grande do Sul (the Farroupilha Revolution) and the Cabanagem and Balaiada revolts.\n\nPedro II turned Brazil into an emerging power in the international arena. The nation grew to be distinguished from its Hispanic neighbors on account of its political stability, freedom of speech, respect for civil rights, vibrant economic growth, and form of government—a functional representative parliamentary monarchy. Pedro II pushed through the abolition of slavery despite opposition from powerful political and economic interests. A savant in his own right, the Emperor established a reputation as a vigorous sponsor of learning, culture, and the sciences, and he won the respect and admiration of people such as Charles Darwin, Victor Hugo, and Friedrich Nietzsche. He was also a friend to Richard Wagner, Louis Pasteur, and Henry Wadsworth Longfellow, among others.§!"

  ### (ENG) United Kingdom ###
  ENG_Victoria: "Victoria"
  ENG_desc_queen_vic: "§YPopular Monarch§!\n - £stability_texticon Stability: §G+0.05%§!\n\n§YBorn:§! §LMay 24th 1819, Kensington Palace, London, United Kingdom of Great Britain and Ireland§!\n§YBackground:§! §LQueen of the United Kingdom of Great Britain and Ireland (Queen of the United Kingdom), Victoria has exercised sovereign authority since 20 June 1837, ascending the throne at the age of eighteen following the death of her uncle, King William IV. Raised in relative seclusion and brought abruptly to power, she entered reign amid a mature parliamentary system in which the monarchy’s role was defined by constitutional convention rather than direct rule.\n\nOver the course of her reign to date, Victoria has come to embody the continuity of the Crown within a rapidly changing society marked by industrial growth, political reform, and expanding global responsibilities. Her marriage to Prince Albert in 1840 strengthened the court’s engagement with public life, culture, and administration, while her close working relationships with successive ministers underscored the monarch’s advisory role within government. Balancing personal authority with constitutional restraint, Victoria stands as a symbol of stability and national unity, presiding over a kingdom whose power and influence extend far beyond its shores.§!"
  
  ### (GRE) Greece ###
  GRE_Otto: "Otto I"
  GRE_characters_otto_desc: "§YUnpopular Monarch§!\n - £stability_texticon Stability: §R-20%§!\n\n§YBorn:§! §LJune 1st 1815, Salzburg, Austrian Empire§!\n§YBackground:§! §LOtto I Basileus tes Hellados (King of Greece), born Prince Otto Friedrich Ludwig of Bavaria, has exercised sovereign authority since 7 May 1832, having been placed upon the newly established Greek throne by the Great Powers following the War of Independence. Ascending as a minor and foreign prince of the House of Wittelsbach, his early reign was conducted under a Bavarian regency, shaping the foundations of the modern Greek state through imported administrative models and centralized rule.\n\nUpon assuming full authority, Otto I governed as an absolute monarch until sustained political pressure culminated in the granting of a constitution in 1843, redefining the relationship between Crown and state. His reign has unfolded amid persistent financial strain, factional politics aligned with foreign patrons, and the challenge of forging national institutions in a kingdom still consolidating its sovereignty. Balancing royal authority with constitutional obligation and the influence of Britain, France, and Russia, Otto I stands as a ruler whose position rests upon both dynastic legitimacy and the fragile equilibrium of Greece’s international guarantees.§!"
 
  ### (HOL) Netherlands ###
  HOL_VL_William_III: "Willem III"
  HOL_characters_William_III_desc: "§YAutocratic tendencies§!\n - £stability_texticon Stability: §R-10%§!\n\n§YBorn:§! §LFebruary 19th 1817, Palace of the Nation, Brussel, United Kingdom of the Netherlands§!\n§YBackground:§! §LWillem III, Koning der Nederlanden en Groothertog van Luxemburg (King of the Netherlands and Grand Duke of Luxembourg), has exercised sovereign authority since 17 March 1849, succeeding his father Willem II in the immediate aftermath of the constitutional transformation of 1848. Ascending the throne at a moment when royal prerogative had been sharply curtailed, he inherited a parliamentary system that fundamentally reshaped the balance between Crown and States-General.\n\nFormed by military education and a strong attachment to traditional monarchical authority, Willem III has approached his reign with a pronounced sense of personal duty and royal dignity. His rule has been marked by recurring tension with liberal ministries, particularly in matters touching religion, constitutional interpretation, and the limits of executive power. Within these constraints, he remains an assertive sovereign, seeking to preserve the influence of the Crown while governing a stable and increasingly self-confident kingdom whose political life is defined by constitutional practice rather than dynastic command.§!\n" 

  ### (HUN) Hungary ###
  HUN_Ferenc_Jozsef: "I. Ferenc József"
  HUN_characters_Ferenc_Jozsef_desc: "§YMagyarország Apostoli Királya (Apostolic King of Hungary)§!\n - £stability_texticon Stability: §G+10%§!\n - £pol_power Political Power Gain: §G+5%§!\n\n§LHistorical Context:\nBetween 1848 and 1867:\nFranz Joseph (Ferenc József in Hungarian) was proclaimed the Emperor in 1848 after his uncle, King Ferdinand V. abdicated the throne. According to Hungarian Law, the Crown of St.Stephen cannot be passed down by an abdication, it has to be supported by the Hungarian diet, meaning that his claim to the throne was illegitimate. After the Revolution of 1848/49 was defeated by Austria, the Hungarian nobility was willing to accept him if he recognises the April Laws of 1848, but he denied as that would have meant taking an oath to the Hungarians, and recognising Hungary as an independent state. He only accepted the offer after the defeat in the Brothers' War as his hands were tied.\n\nThe Compromise:\nAfter the Ausgleich he had no choice but to accept the coronation. His coronation took place in the Matthias Church. After the coronation day he could finally rule Hungary and the Realm of St.Stephen as the legitimate king.\n\nHis title, the Apostolic King:\nApostolic King, or Apostolic Majesty is a title used by the kings of Hungary. The origin of title can be traced back to St.Stephen. The legend of Hartvik says that Pope Sylvester II himself hailed St.Stephen as an Apostle of Christ, referring to his holy labours in spreading the Catholic faith in Hungary, by gifting him the apostolic cross. This meant that he could appoint Archbishops and organise the chruch in Hungary. Since then every Hungarian king hold the title. In our time, this title is mearly symbolic, but it bears almost a millenia of history and legends.§!" 

  ### (LUX) Luxembourg ###
  LUX_VL_William_III: "Willem III"
  LUX_characters_William_III_desc: "§YAutocratic tendencies§!\n - £stability_texticon Stability: §R-10%§!\n\n§YBorn:§! §LFebruary 19th 1817, Palace of the Nation, Brussel, United Kingdom of the Netherlands§!\n§YBackground:§! §LWillem III, Koning der Nederlanden en Groothertog van Luxemburg (King of the Netherlands and Grand Duke of Luxembourg), has exercised sovereign authority over the Grand Duchy since 17 March 1849, inheriting the crown in personal union with the Kingdom of the Netherlands upon the death of his father. His accession followed closely upon the constitutional upheavals of the late 1840s, which had reshaped political life within Luxembourg while affirming its status as a distinct state within the German Confederation.\n\nRuling largely from afar, Willem III governs Luxembourg through established institutions and appointed officials, balancing grand-ducal prerogative with the legacy of constitutional government introduced during the revolutionary period. His reign reflects the particular position of the Grand Duchy: a small but strategically significant polity whose internal affairs are shaped by dynastic union, confederal obligations, and the need for political stability. Within these constraints, Willem III stands as a distant yet decisive sovereign, seeking to maintain order and authority in a state defined by compromise between local autonomy and inherited monarchical rule.§!" 

  ### (OLD) Oldenburg ###
  OLD_VL_Peter_II: "Peter II"
  OLD_characters_Peter_II_desc: "§YPopular Monarch§!\n - £stability_texticon Stability: §G+10%§!\n\n§YBorn:§! §LJuly 8th 1827, Oldenburg, Grand Duchy of Oldenburg§!\n§YBackground:§! §LPeter II, Großherzog von Oldenburg (Grand Duke of Oldenburg), has exercised sovereign authority over the Grand Duchy since 27 February 1853, succeeding his father Augustus at a time of political caution following the upheavals of 1848. Educated under strict dynastic discipline and shaped by early military service in German states, he entered rule determined to preserve continuity in administration and foreign alignment.\n\nPeter II’s reign has been defined by careful navigation between the interests of the German Confederation’s leading powers and the need to safeguard Oldenburg’s autonomy as a small but established state. Closely tied by blood to the Russian imperial house and attentive to developments in Schleswig-Holstein, he has governed with a pragmatic outlook, favoring stability, loyal institutions, and orderly government over political experimentation. Within this framework, Peter II stands as a reserved and conscientious ruler, seeking to secure his duchy’s position through measured diplomacy and steadfast adherence to dynastic responsibility.§!\n" 

  ### (PIE) Sardinia-Piedmont ###
  PIE_Victor: "Victor Emmanuel II"
  PIE_characters_Victor_desc: "§YAutocratic Imperialist§!\n§G+0.05%§! War Support\n§G+0.1%§! Stability\n\n§YBorn:§! §LMarch 14th 1820, Turin, Kingdom of Sardinia§!\n§YBackground:§! §LRe di Sardegna (King of Sardinia), Victor Emmanuel II has exercised sovereign authority since 23 March 1849, ascending the throne following the abdication of his father Charles Albert in the aftermath of military defeat by Austria. Inheriting a state shaken by war and internal division, he confirmed the constitutional charter granted during the revolutions of 1848, anchoring his rule in legality at a moment when reaction prevailed across much of Europe.\n\nFormed by military service and the hard lessons of defeat, Victor Emmanuel II governs with a pragmatic blend of dynastic authority and constitutional restraint. His reign has been shaped by close cooperation with parliamentary leaders and a deliberate effort to strengthen Sardinia-Piedmont’s standing among the Great Powers, most notably through participation in the Crimean War. Within Italy, his crown has become a focal point for liberal and national aspirations, positioning the Sardinian state as a leading force in the political reordering of the peninsula, while the king himself stands as a soldier-sovereign balancing caution, ambition, and the burdens of leadership in an unsettled age.§!"
  
  ### (TSH) Tokugawa Shogunate ###
  JAP_komei: "Kōmei"
  JAP_characters_emperor_komei_desc: "§YHeadstrong§!\n§G+15%§! Political Power Gain\n§R-3%§! Stability\n\n§LKōmei, born Osahito, is the 121st Emperor of Japan. A staunch traditionalist, he has consistently opposed the opening of Japan to foreign powers and the unequal treaties signed by the Shogunate. Though his power is largely ceremonial under the Tokugawa regime, his views carry significant moral weight among those who wish to restore direct imperial rule.§!"
  
  JAP_Meiji: "Meiji"
  JAP_characters_emperor_meiji_desc: ""

  ### (USA) United States of America ###
  USA_Breckinridge: "John C. Breckinridge"
  USA_characters_Breckinridge_desc: "§YStaunch Constitutionalist§!\n§G+0.5%§! Drift Defence\n\n§LJohn Cabell Breckinridge of Kentucky is the fourteenth and youngest Vice President in American history, assuming office at just thirty-six years of age. A scion of one of Kentucky's most distinguished political families and grandson of Thomas Jefferson's Attorney General, he carries an almost aristocratic bearing that commands respect across party lines. As President of the Senate, he presides with grace and impartiality, earning admiration even from political opponents. Yet his role is largely ceremonial—President Buchanan rarely seeks his counsel, and the Vice Presidency affords him no platform to voice his own views on the slavery question tearing the nation apart. A strict constructionist who believes the Constitution must be preserved at all costs, Breckinridge finds himself caught between Southern firebrands demanding secession and Northern abolitionists he views as equally dangerous to the Union. Whether he can thread this needle remains to be seen.§!" 
  
