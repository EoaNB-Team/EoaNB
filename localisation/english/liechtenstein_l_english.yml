l_english:
  LIE_ALOYS_II_LEADER_DESC: "§YBorn:§! §L26 May 1796, Vienna, Archduchy of Austria§!\n§YBackground:§! §LAloys II, Fürst von Liechtenstein (Prince of Liechtenstein), has exercised sovereign authority over the Principality since 20 April 1836, succeeding his father Johann I at a time when Liechtenstein’s political existence remained closely bound to the structures of the German Confederation. Raised within the aristocratic and administrative culture of Vienna, he entered rule with extensive exposure to dynastic governance and the management of widely dispersed princely estates.\n\nDuring his reign, Aloys II has taken a notably direct interest in the affairs of his small Alpine state, becoming the first reigning prince to personally visit Liechtenstein in 1842 and establishing a closer connection between ruler and territory. His rule has unfolded amid the broader political disturbances of the 1840s, during which he issued a provisional constitution while ultimately reaffirming princely authority. Firmly rooted in dynastic responsibility and traditional legitimacy, Aloys II governs with an emphasis on order, continuity, and the preservation of sovereign prerogative within a rapidly shifting German world.§!"
  LIE_JOHANN_II_LEADER_DESC: "§YBorn:§! §L5 October 1840, Eisgrub, Margraviate of Moravia§!\n§YBackground:§! §LFürst von Liechtenstein (Prince of Liechtenstein), Johann II has exercised sovereign authority over the Principality since 12 November 1858, ascending the throne upon the death of his father Aloys II while still in his eighteenth year. Raised within the dynastic environment of the Liechtenstein estates in Moravia, his early life was shaped by careful education and close observation of princely governance rather than direct participation in state affairs.\n\nHis accession comes at a moment of continuity for a small but sovereign state whose political structures and external position remain largely unchanged since the upheavals of the previous decade. With day-to-day administration proceeding under established institutions and trusted advisers, Johann II’s rule begins under the sign of inherited authority and dynastic stability. The young prince stands as the embodiment of continuity within the House of Liechtenstein, assuming the burdens of sovereignty with restraint and formality as the principality enters a new generation of rule.§!"
  LIE_legacyofrheinbund: "Legacy of the Rheinbund"
